<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seblak Ateu</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <img src="img/logo.png" alt="Logo Seblak Ateu" />
        </div>

        <h1 class="navbar-brand">Seblak Ateu</h1>

        <ul class="nav-menu">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#tentang">Tentang Kami</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="index.html#galeri">Galeri</a></li>
          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="contact" class="container py-5">
        <div class="contact-container">
          <div class="contact-form">
            <h3>Kirim Pesan</h3>

            <form id="formPesan">
              <label for="nama">Nama</label>

              <input
                type="text"
                id="nama"
                name="nama"
                placeholder="Masukkan nama Anda"
              />

              <label for="email">Email</label>

              <input
                type="email"
                id="email"
                name="email"
                placeholder="Masukkan email Anda"
              />

              <label for="telepon">No. Telepon</label>

              <input
                type="tel"
                id="telepon"
                name="telepon"
                placeholder="Masukkan nomor telepon"
              />

              <label for="pesankontak">Pesan</label>

              <textarea
                id="pesankontak"
                name="pesankontak"
                rows="6"
                placeholder="Tuliskan pesan Anda"
              ></textarea>

              <button type="submit" class="btn">Kirim Pesan</button>
              <p id="hasil" class="form-feedback" aria-live="polite"></p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div class="contact-map">
      <h3>Lokasi Kami</h3>

      <iframe
        src="https://www.google.com/maps?q=-6.5504397,107.4223226&z=15&output=embed"
        width="100%"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        
        referrerpolicy="no-referrer-when-downgrade"
        title="Lokasi Seblak Ateu"
      >
      </iframe>
    </div>

    <footer>
      <div class="social-icons">
        <div class="social-icon">
          <img src="img/instagram.jpeg" alt="Instagram" />
        </div>

        <div class="social-icon">
          <img src="img/facebook.jpeg" alt="Facebook" />
        </div>

        <a href="https://wa.me/082258330405" class="social-icon" target="_blank">
    <img src="img/whatsapp.jpeg" alt="WhatsApp">
</a>
      </div>
      <p>© 2026 Seblak Ateu. All Rights Reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
