<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seblak Ateu</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <img src="img/logo.png" alt="Logo Seblak Ateu" />
        </div>

        <h1 class="navbar-brand">Seblak Ateu</h1>

         <ul class="nav-menu">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#tentang">Tentang Kami</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="index.html#galeri">Galeri</a></li>
          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="contact">
        <h2>Hubungi Kami</h2>

        <p class="contact-text">
          Jika Anda memiliki pertanyaan atau ingin melakukan pemesanan, silakan
          hubungi kami melalui informasi di bawah ini atau isi formulir yang
          tersedia.
        </p>

        <div class="contact-container">
          <div class="contact-form">
            <h3>Kirim Pesan</h3>

            <form id="formPesan">
              <label for="nama">Nama</label>

              <input
                type="text"
                id="nama"
                name="nama"
                placeholder="Masukkan nama Anda"
              />

              <label for="email">Email</label>

              <input
                type="email"
                id="email"
                name="email"
                placeholder="Masukkan email Anda"
              />

              <label for="telepon">No. Telepon</label>

              <input
                type="tel"
                id="telepon"
                name="telepon"
                placeholder="Masukkan nomor telepon"
              />

              <label for="pesankontak">Pesan</label>

              <textarea
                id="pesankontak"
                name="pesankontak"
                rows="6"
                placeholder="Tuliskan pesan Anda"
              ></textarea>

              <button type="submit" class="btn">Kirim Pesan</button>
              <p id="hasil" class="form-feedback" aria-live="polite"></p>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="social-icons">
        <div class="social-icon instagram" title="Instagram">
          <span>📷</span>
        </div>
        <div class="social-icon facebook" title="Facebook">
          <span>f</span>
        </div>
        <div class="social-icon whatsapp" title="WhatsApp">
          <span>💬</span>
        </div>
      </div>
      <p>© 2026 Seblak Ateu. All Rights Reserved.</p>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
